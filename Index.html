<!DOCTYPE html>
<html>
<head>
  <title>Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <link rel="stylesheet" href="css/style.css">

  <style>
    #map { height: 100vh; }
  </style>
</head>

<body>

  <!-- Title section -->
  <div id="title">

    <h2>Cooling off on the Danube</h2>
  </div>

<div id="map"></div>


<script>
// Create map
const map = L.map('map').setView([48.23, 16.45], 12);

// Add base tile layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Base map 1: OpenStreetMap
const osm = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    attribution: "&copy; OpenStreetMap contributors"
  }
);

// Base map 2: Carto Light
const cartoLight = L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
  {
    attribution: "&copy; OpenStreetMap & CARTO"
  }
);

// Base map 3: ESRI Satellite
const esriSat = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "Tiles &copy; Esri"
  }
);


const baseMaps = {
  "OpenStreetMap": osm,
  "Carto Light": cartoLight,
  "ESRI Satellite": esriSat
};

L.control.layers(baseMaps).addTo(map);






fetch("Pontoons.geojson")
  .then(r => r.json())
  .then(data => {
    allData = data;

    drawLayer(allData); // initial render
  });

function drawLayer(data) {

  // remove old layer if it exists
  if (geoLayer) {
    geoLayer.remove();
  }

  geoLayer = L.geoJSON(data, {
    pointToLayer: function (feature, latlng) {
      return L.circleMarker(latlng, {
        radius: 6,
        color: "green",
        fillOpacity: 0.8
      });
    },
    onEachFeature: function (feature, layer) {
      layer.bindPopup(`
        <b>Pontoon</b><br>
        Chill: ${feature.properties.CHILL_AREA}<br>
        Shade: ${feature.properties.SHADE}<br>
        Lawn: ${feature.properties.LAWN}<br>
        Notes: ${feature.properties.NOTES}
      `);
    }
  }).addTo(map);

  map.fitBounds(geoLayer.getBounds());
}

function filterShade(value) {

  const filtered = {
    type: "FeatureCollection",
    features: allData.features.filter(f =>
      f.properties.SHADE === value
    )
  };

  drawLayer(filtered);
}


  </script>

</body>
</html>
