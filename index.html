<!DOCTYPE html>
<html>
<head>
  <title>Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <link rel="stylesheet" href="css/style.css">

  <style>
    #map { height: 100vh; }
  </style>
</head>

<body>

  <!-- Title section -->
  <div id="title">
    <h2>Cooling off on the Danube</h2>
  </div>




<div id="map"></div>



<script>
// Create map
const map = L.map('map').setView([48.23, 16.45], 12);

// Add base tile layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Base map 1: OpenStreetMap
const osm = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    attribution: "&copy; OpenStreetMap contributors"
  }
);

// Base map 2: Carto Light
const cartoLight = L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
  {
    attribution: "&copy; OpenStreetMap & CARTO"
  }
);

// Base map 3: ESRI Satellite
const esriSat = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  {
    attribution: "Tiles &copy; Esri"
  }
);


// Add Basemaps to map
const baseMaps = {
  "OpenStreetMap": osm,
  "Carto Light": cartoLight,
  "ESRI Satellite": esriSat
};

L.control.layers(baseMaps).addTo(map);




let allData;
let geoLayer;

fetch("Pontoons.geojson")
  .then(r => r.json())
  .then(data => {
    allData = data;

    drawLayer(allData); // initial render

    setupFilters();
  });

function drawLayer(data) {

  // remove old layer if it exists
  if (geoLayer) {
    geoLayer.remove();
  }

  geoLayer = L.geoJSON(data, {
    pointToLayer: function (feature, latlng) {
      return L.circleMarker(latlng, {
        radius: 6,
        color: "green",
        fillOpacity: 0.8
      });
    },
    onEachFeature: function (feature, layer) {
      layer.bindPopup(`
        <b>Pontoon</b><br>
        Chill: ${feature.properties.CHILL_AREA}<br>
        Shade: ${feature.properties.SHADE}<br>
        Lawn: ${feature.properties.LAWN}<br>
        Notes: ${feature.properties.NOTES}
      `);
    }
  }).addTo(map);

  map.fitBounds(geoLayer.getBounds());
}




//Link Box 
const linkControl = L.control({ position: "bottomright" });

linkControl.onAdd = function () {
  const div = L.DomUtil.create("div");

  div.innerHTML = `
    <a href="https://example.com" target="_blank" class="link-button">
      Click here to send us <br> new information
    </a>
  `;

  // prevent map interactions when clicking UI
  L.DomEvent.disableClickPropagation(div);

  return div;
};

linkControl.addTo(map);



//Leaflet Style Filters

const filterControl = L.control({ position: "topright" });

filterControl.onAdd = function () {
  const div = L.DomUtil.create("div", "filter-panel");

  div.innerHTML = `
    <b>Filters</b><br><br>

    <label>
      <input type="checkbox" id="shadeYes">
      Shade
    </label><br>

    <label>
      <input type="checkbox" id="lawnState">
      Lawn
    </label><br>

    <label>
      <input type="checkbox" id="fkkState">
      noFKK
    </label><br><br>

    <label>
      Min Chill Area: <span id="chillAreaLabel">100</span> sqm
    </label><br>

    <input type="range"
           id="chillAreaSlider"
           min="0"
           max="100"
           value="100"
           step="1">
  `;

  // prevent map zoom when interacting with panel
  L.DomEvent.disableClickPropagation(div);

  return div;
};


// Unified Filters
function setupFilters() {

  const shadeBox = document.getElementById("shadeYes");
  const lawnBox = document.getElementById("lawnState");
  const fkkBox = document.getElementById("fkkState");
  const slider = document.getElementById("chillAreaSlider");
  const label = document.getElementById("chillAreaLabel");

  function applyFilters() {

    const chillArea = Number(slider.value);

    label.innerText = chillArea;

    const filtered = {
      type: "FeatureCollection",
      features: allData.features.filter(f => {

        const shadeOK =
          !shadeBox.checked || f.properties.SHADE === 1;

        const lawnOK =
          !lawnBox.checked || f.properties.LAWN === 0;

        const fkkOK =
          !fkkBox.checked || f.properties.FKK === 0;

        const chillAreaValue =
          Number(f.properties.CHILL_AREA);

        const chillAreaOK =
          chillAreaValue >= chillArea;

        return shadeOK && lawnOK && chillAreaOK && fkkOK;
      })
    };

    drawLayer(filtered);
  }

  shadeBox.addEventListener("change", applyFilters);
  lawnBox.addEventListener("change", applyFilters);
  slider.addEventListener("input", applyFilters);
}

filterControl.addTo(map);

  </script>

</body>
</html>
