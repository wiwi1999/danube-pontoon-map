<!DOCTYPE html>
<html>
<head>
  <title>Cooling off on the Danube</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css">

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

  <div id="title">
    <h2>Cooling off on the Danube</h2>

    <select id="shadeFilter">
      <option value="all">All shade levels</option>
      <option value="none">No shade</option>
      <option value="partial">Partial shade</option>
      <option value="good">Good shade</option>
    </select>
  </div>

  <div id="map"></div>

  <script>
    let allData;
    let geoLayer;

    const map = L.map('map').setView([48.23, 16.45], 12);

    const osm = L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        attribution: "&copy; OpenStreetMap contributors"
      }
    ).addTo(map);

    const cartoLight = L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
      {
        attribution: "&copy; OpenStreetMap & CARTO"
      }
    );

    const esriSat = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      {
        attribution: "Tiles &copy; Esri"
      }
    );

    const baseMaps = {
      "OpenStreetMap": osm,
      "Carto Light": cartoLight,
      "ESRI Satellite": esriSat
    };

    L.control.layers(baseMaps).addTo(map);

    fetch("data/pontoons.geojson")
      .then(response => response.json())
      .then(data => {
        allData = data;
        drawLayer(allData);
      });

    function drawLayer(data) {
      if (geoLayer) {
        geoLayer.remove();
      }

      geoLayer = L.geoJSON(data, {
        pointToLayer: function (feature, latlng) {
          return L.circleMarker(latlng, {
            radius: 6,
            color: "green",
            fillColor: "green",
            fillOpacity: 0.8
          });
        },

        onEachFeature: function (feature, layer) {
          layer.bindPopup(`
            <b>Pontoon</b><br>
            Chill area: ${feature.properties.CHILL_AREA || "unknown"}<br>
            Shade: ${feature.properties.SHADE || "unknown"}<br>
            Lawn: ${feature.properties.LAWN || "unknown"}<br>
            Notes: ${feature.properties.NOTES || "none"}
          `);
        }
      }).addTo(map);

      if (geoLayer.getBounds().isValid()) {
        map.fitBounds(geoLayer.getBounds());
      }
    }

    document.getElementById("shadeFilter").addEventListener("change", function () {
      const value = this.value;

      if (value === "all") {
        drawLayer(allData);
        return;
      }

      const filtered = {
        type: "FeatureCollection",
        features: allData.features.filter(feature =>
          feature.properties.SHADE === value
        )
      };

      drawLayer(filtered);
    });
  </script>

</body>
</html>
